name: Playground Preview - Build
on:
  pull_request:

jobs:
  build:
    uses: WordPress/action-wp-playground-pr-preview/.github/workflows/preview-build.yml@v3
    with:
      artifacts: plugin=build/wpui-frappe-plugin-starter.zip
      node-version: '20'
      build-command: |
        npm ci
        npm run build
        mkdir -p dist/wpui-frappe-plugin-starter
        rsync -a --exclude='node_modules' --exclude='.git' --exclude='dist' . dist/wpui-frappe-plugin-starter/
        mkdir -p build
        cd dist && zip -r ../build/wpui-frappe-plugin-starter.zip wpui-frappe-plugin-starter
